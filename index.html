// ─── CSV EXPORT ──────────────────────────────────────────────────────────────
function exportCSV(entries, filename='manepally-entries.csv') {
  const headers = ['Date','Entry Time','Exit Time','Time Spent (min)','Store','CRE Name','Customer Name','Phone','Type','Purpose','Category','Counter','Outcome','Bill No.','Non-Conv Reason','Remarks'];
  const rows = entries.map(e => {
    const d = new Date(e.timestamp);
    const exitTs = e.exitTimestamp ? new Date(e.exitTimestamp) : null;
    const spent = exitTs ? Math.round((e.exitTimestamp - e.timestamp)/60000) : '';
    return [
      d.toLocaleDateString('en-IN'),
      d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
      exitTs ? exitTs.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '',
      spent,
      e.storeName||'',
      e.creName||'',
      e.custName||'',
      e.phone||'',
      e.custType||'',
      e.purpose||'',
      e.category||'',
      e.counterName||'',
      e.outcome||'',
      e.billNo||'',
      e.reason||'',
      e.remarks||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
function DonutChart({pct, color='#C9A96E', size=80}){
  const r=32, circ=2*Math.PI*r, dash=circ*(pct/100);
  return (
    <div className="donut-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox="0 0 80 80">
        <circle cx="40" cy="40" r={r} fill="none" stroke="#320A1A" strokeWidth="8"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 40 40)" style={{transition:'stroke-dasharray .5s'}}/>
      </svg>
      <div className="donut-center">
        <div className="donut-pct" style={{color}}>{Math.round(pct)}%</div>
        <div className="donut-lbl">conv.</div>
      </div>
    </div>
  );
}

function MiniBarChart({data, color='#C9A96E'}){
  const max=Math.max(...data.map(d=>d.v),1);
  return (
    <div className="bar-chart">
      {data.map((d,i)=>(
        <div key={i} className="bar-col">
          <div className="bar-val">{d.v||''}</div>
          <div className="bar-fill" style={{height:`${(d.v/max)*70}px`,background:color,opacity:.7+i/data.length*.3}}/>
          <div className="bar-lbl">{d.l}</div>
        </div>
      ))}
    </div>
  );
}

// ─── LOGIN SCREEN ────────────────────────────────────────────────────────────
function LoginScreen({stores, adminPass, onLogin}){
  const [role, setRole]   = useState('cre');
  const [selStore, setSel] = useState(stores[0]?.id||'');
  const [pin, setPin]     = useState('');
  const [pass, setPass]   = useState('');
  const [err, setErr]     = useState('');

  function handleLogin(){
    if(role==='admin'){
      if(pass===adminPass){ onLogin({role:'admin',name:'Admin',id:'admin'}); return; }
      setErr('Wrong admin password.'); return;
    }
    const store = stores.find(s=>s.id===selStore);
    if(!store){ setErr('Select a store.'); return; }
    if(store.pin===pin){
      onLogin({role:'cre', name:'CRE', id:'cre_'+store.id, storeId:store.id, storeName:store.name});
    } else {
      setErr('Wrong PIN. Ask your manager.');
    }
  }

  return (
    <div className="login-wrap">
      <style>{CSS}</style>
      <div className="login-bg"/>
      <div className="login-card fade-in">
        <div className="login-brand">✦ Manepally Jewellers</div>
        <div className="login-tagline">Retail Intelligence Platform</div>
        <div className="login-divider"/>

        <div className="role-tabs" style={{marginBottom:20,marginTop:16}}>
          {['cre','admin'].map(r=>(
            <button key={r} className={`role-tab${role===r?' active':''}`} onClick={()=>{setRole(r);setErr('');}}>
              {r==='cre'?'CRE / Staff':'Admin'}
            </button>
          ))}
        </div>

        {role==='cre' && (
          <>
            <label className="input-label">Select Your Store</label>
            <select className="inp" style={{cursor:'pointer'}} value={selStore} onChange={e=>setSel(e.target.value)}>
              {stores.filter(s=>s.active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <label className="input-label">Store PIN</label>
            <input className="inp" type="password" inputMode="numeric" maxLength={6} placeholder="Enter store PIN"
              value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
          </>
        )}

        {role==='admin' && (
          <>
            <label className="input-label">Admin Password</label>
            <input className="inp" type="password" placeholder="Enter admin password"
              value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
            <div className="login-hint">Enter your admin password.</div>
          </>
        )}

        <button className="btn-primary" onClick={handleLogin}>Sign In →</button>
        {err && <div className="login-err">{err}</div>}

        {role==='cre' && (
          <div className="login-hint">Each store has its own PIN.<br/>Your manager will give you the PIN.</div>
        )}
      </div>
    </div>
  );
}

// ─── ENTRY MODAL (quick check-in — outcome set later) ────────────────────────
function EntryModal({user, stores, counters, entries, onClose, onSave}){
  const [step, setStep]       = useState(1);
  const [phone, setPhone]     = useState('');
  const [custName, setName]   = useState('');
  const [foundCust, setFound] = useState(null);
  const [purpose, setPurp]    = useState('');
  const [category, setCat]    = useState('');
  const [counter, setCtr]     = useState(null);
  const [remarks, setRemarks] = useState('');
  const [saving, setSaving]   = useState(false);

  const storeCounters = (counters[user.storeId]||[]).filter(c=>c.active);
  const STEPS = 5;

  useEffect(()=>{
    if(phone.length===10){
      const prev = entries.filter(e=>e.phone===phone);
      if(prev.length){
        const last=prev.sort((a,b)=>b.timestamp-a.timestamp)[0];
        setFound({name:last.custName,visits:prev.length,last});
        if(last.custName&&!custName) setName(last.custName);
      }
    } else setFound(null);
  },[phone]);

  async function submit(){
    if(saving) return;
    setSaving(true);
    const ctr = storeCounters.find(c=>c.id===counter);
    const store = stores.find(s=>s.id===user.storeId);
    const entry = {
      timestamp: Date.now(),
      storeId: user.storeId, storeName: store?.name||'',
      creName: user.name,
      custName: custName||null, phone: phone||null,
      custType: foundCust?'Repeat':'New',
      purpose, category,
      counterId: counter, counterName: ctr?.name||'', counterCat: ctr?.cat||'',
      outcome: 'Browsing',   // default — CRE updates this at exit
      exitTimestamp: null,
      billNo: null,
      reason: null,
      remarks,
    };
    try {
      await fbPush(fbRef(fbDb(), 'entries'), entry);
      onSave();
    } catch(e){ alert('Save failed: '+e.message); }
    setSaving(false);
  }

  const canNext = {1:true, 2:!!purpose, 3:!!category, 4:!!counter, 5:true};
  function next(){ if(step<STEPS) setStep(s=>s+1); else { submit(); onClose(); } }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fade-in">
        <div className="modal-head">
          <div className="modal-title">New Customer Check-in</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="step-indicator">
            {Array.from({length:STEPS}).map((_,i)=>(
              <div key={i} className={`step-dot${i+1===step?' active':i+1<step?' done':''}`}/>
            ))}
            <span className="step-label">Step {step} of {STEPS}</span>
          </div>

          {step===1 && (
            <div className="fade-in">
              <div className="step-title">Phone Number <span style={{color:'#9A7080',fontWeight:400,fontSize:12}}>(Optional)</span></div>
              {foundCust && (
                <div className="customer-found">
                  <div className="cf-name">↩ Returning: {foundCust.name||'Customer'}</div>
                  <div className="cf-detail">{foundCust.visits} visit(s) · Last: {fmtShort(foundCust.last.timestamp)} · {foundCust.last.outcome}</div>
                </div>
              )}
              <input className="inp" style={{marginBottom:8}} placeholder="10-digit mobile" maxLength={10}
                value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/,'').slice(0,10))}/>
              <input className="inp" placeholder="Customer name (optional)"
                value={custName} onChange={e=>setName(e.target.value)}/>
            </div>
          )}

          {step===2 && (
            <div className="fade-in">
              <div className="step-title">Purpose of Visit</div>
              <div className="tap-grid tap-grid-3">
                {PURPOSES.map(p=>(
                  <button key={p} className={`tap-btn${purpose===p?' selected':''}`} onClick={()=>setPurp(p)}>
                    <span className="tb-emoji">{({Purchase:'💎',Browsing:'👁',Repair:'🔧',Pickup:'📦',Custom:'✏️'})[p]}</span>{p}
                  </button>
                ))}
              </div>
            </div>
          )}

          {step===3 && (
            <div className="fade-in">
              <div className="step-title">Jewellery Category</div>
              <div className="tap-grid tap-grid-3">
                {CATEGORIES.map(c=>(
                  <button key={c} className={`tap-btn${category===c?' selected':''}`} onClick={()=>setCat(c)}>
                    <span className="tb-emoji">{({'Gold':'✨','Diamond':'💎','Silver':'🪙','Platinum':'⬜','Nakshi':'🏺','Plain Gold Necklace':'📿','Stone Necklace':'💠','Bangles':'⭕','Rings':'💍','Chains':'🔗','Lockets':'🔒','Oddiynam':'🎀','Gem Stones':'🪨','Repair':'🔧','Multi Products':'🎁'})[c]||'✦'}</span>{c}
                  </button>
                ))}
              </div>
            </div>
          )}

          {step===4 && (
            <div className="fade-in">
              <div className="step-title">Select Counter</div>
              <div className="tap-grid" style={{gridTemplateColumns:'1fr'}}>
                {storeCounters.map(c=>(
                  <button key={c.id} className={`counter-btn${counter===c.id?' selected':''}`} onClick={()=>setCtr(c.id)}>
                    <div className="cb-name">{c.name}</div>
                    {c.products && <div style={{fontSize:10,color:'#8080a0',marginTop:3,lineHeight:1.5}}>{c.products}</div>}
                  </button>
                ))}
              </div>
            </div>
          )}

          {step===5 && (
            <div className="fade-in">
              <div className="step-title" style={{marginTop:8}}>Notes <span style={{color:'#9A7080',fontWeight:400,fontSize:12}}>(Optional)</span></div>
              <textarea className="inp" rows={3} placeholder="Any remarks…" value={remarks} onChange={e=>setRemarks(e.target.value)} style={{resize:'none',marginBottom:0}}/>
              <div style={{marginTop:12,padding:'10px 14px',background:'#1A0810',border:'1px solid #3A0E20',borderRadius:10,fontSize:12,color:'#C9A96E',lineHeight:1.7}}>
                👀 Customer will be logged as <strong>Browsing</strong>.<br/>
                Use the <strong>Update Outcome</strong> button on the dashboard once they leave.
              </div>
            </div>
          )}

          <div className="step-actions">
            {step>1 && <button className="btn step-back" onClick={()=>setStep(s=>s-1)}>← Back</button>}
            <button className="btn btn-gold step-next" onClick={next} disabled={!canNext[step]||saving}>
              {saving?'Saving…':step===STEPS?'✓ Check In':'Next →'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── OUTCOME UPDATE MODAL ─────────────────────────────────────────────────────
function OutcomeModal({entry, onClose}){
  const [outcome, setOut]   = useState(entry.outcome==='Browsing'?'':entry.outcome);
  const [reason, setReason] = useState(entry.reason||'');
  const [billNo, setBill]   = useState(entry.billNo||'');
  const [saving, setSaving] = useState(false);

  async function save(){
    if(!outcome) return;
    setSaving(true);
    const now = Date.now();
    const updates = {
      outcome,
      exitTimestamp: entry.exitTimestamp || now,
      reason: outcome==='Not Converted'?reason:null,
      billNo: outcome==='Converted'?(billNo||null):null,
    };
    try {
      await fbUpdate(fbRef(fbDb(),`entries/${entry.id}`), updates);
      onClose();
    } catch(e){ alert('Update failed: '+e.message); }
    setSaving(false);
  }

  const entryTime = fmtTime(entry.timestamp);
  const elapsed   = fmtSpent(entry.timestamp, Date.now());

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fade-in">
        <div className="modal-head">
          <div className="modal-title">Update Outcome</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{background:'#130810',border:'1px solid #3A0E20',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#C0A0A8',lineHeight:1.8}}>
            <div><span style={{color:'#9A7080'}}>Customer: </span><span style={{color:'#F0E0E4',fontWeight:600}}>{entry.custName||entry.phone||'Unknown'}</span></div>
            <div><span style={{color:'#9A7080'}}>Counter: </span>{entry.counterName} · {entry.category}</div>
            <div><span style={{color:'#9A7080'}}>Entry: </span>{entryTime} &nbsp;·&nbsp; <span style={{color:'#f59e0b'}}>Time so far: {elapsed}</span></div>
          </div>

          <div className="step-title">What happened?</div>
          <div className="tap-grid tap-grid-2" style={{marginBottom:12}}>
            {OUTCOMES.filter(o=>o.key!=='Browsing').map(o=>(
              <button key={o.key} className={`tap-btn outcome-btn${outcome===o.key?' selected':''}`}
                style={outcome===o.key?{borderColor:o.color,color:o.color,background:`${o.color}18`}:{}}
                onClick={()=>setOut(o.key)}>
                <span className="tb-emoji">{o.emoji}</span>{o.label}
              </button>
            ))}
          </div>

          {outcome==='Not Converted' && (
            <>
              <div className="step-title" style={{marginBottom:8}}>Why didn't they buy?</div>
              <div className="tap-grid tap-grid-2" style={{marginBottom:12}}>
                {NO_CONV_REASONS.map(r=>(
                  <button key={r} className={`tap-btn${reason===r?' selected':''}`} onClick={()=>setReason(r)}>{r}</button>
                ))}
              </div>
            </>
          )}

          {outcome==='Converted' && (
            <div style={{marginBottom:12}}>
              <label className="form-label">Bill Number <span style={{color:'#9A7080',fontWeight:400,fontSize:11}}>(Optional — enter by EOD)</span></label>
              <input className="inp" placeholder="e.g. ZJ-20450" value={billNo} onChange={e=>setBill(e.target.value)}/>
            </div>
          )}

          <button className="btn btn-gold" style={{width:'100%'}} onClick={save} disabled={!outcome||saving}>
            {saving?'Saving…':'✓ Save & Close Visit'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CRE DASHBOARD ───────────────────────────────────────────────────────────
function CreeDashboard({user, stores, counters, entries}){
  const [showModal,    setModal]    = useState(false);
  const [outcomeEntry, setOutcome]  = useState(null);
  const [billEntry,    setBill]     = useState(null);

  const myEntries  = entries.filter(e=>e.storeId===user.storeId);

function AdminStores({stores, entries, onUpdate}){

  const [form, setForm]   = useState({name:'', pin:''});
  const [editId, setEdit] = useState(null);
  const [editPin, setEPin] = useState('');

  async function addStore(){
    if(!form.name.trim()||!form.pin.trim()) return;
    const id='s'+(Date.now());
    const newStore = {id, name:form.name.trim(), pin:form.pin.trim(), active:true};
    await fbSet(fbRef(fbDb(),`stores/${id}`), newStore);
    setForm({name:'',pin:''}); setAdd(false);
  }
  async function toggleStore(s){
    await fbUpdate(fbRef(fbDb(),`stores/${s.id}`), {active:!s.active});
  }
  async function updatePin(s){
    if(!editPin.trim()) return;
    await fbUpdate(fbRef(fbDb(),`stores/${s.id}`), {pin:editPin.trim()});
    setEdit(null); setEPin('');
  }

  return (
    <div className="fade-in">
      <div className="page-header">

        <div className="page-sub">Manage stores and CRE login PINs</div>

              <div className="form-row">

                <button className="btn btn-gold" onClick={addStore}>Add Store</button>
                <button className="btn" onClick={()=>setAdd(false)}>Cancel</button>

                    : <span style={{fontFamily:'monospace',color:'#C9A96E',fontWeight:700,fontSize:14}}>{s.pin}</span>

              </div>

function AdminCounters({stores, counters, onUpdate}){
  const [selStore, setSel] = useState(stores[0]?.id||'');
  const [showAdd, setAdd]  = useState(false);
  const [form, setForm]    = useState({name:'',cat:'Gold'});

  const ctrs = (counters[selStore]||[]);

  async function addCounter(){
    if(!form.name.trim()) return;
    const id='c'+(Date.now());
    const existing = ctrs;
    const updated  = [...existing, {id, name:form.name.trim(), cat:form.cat, active:true}];
    await fbSet(fbRef(fbDb(),`counters/${selStore}`), updated);
    setForm({name:'',cat:'Gold'}); setAdd(false);
  }
  async function toggleCounter(id){
    const updated = ctrs.map(c=>c.id===id?{...c,active:!c.active}:c);
    await fbSet(fbRef(fbDb(),`counters/${selStore}`), updated);
  }
  async function removeCounter(id){
    const updated = ctrs.filter(c=>c.id!==id);
    await fbSet(fbRef(fbDb(),`counters/${selStore}`), updated);
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Counter Management</div>
        <div className="page-sub">Counters visible to CREs when logging entries</div>
      </div>
      <div className="filter-bar">
        <select className="filter-sel" value={selStore} onChange={e=>setSel(e.target.value)}>
          {stores.filter(s=>s.active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <button className="btn btn-gold btn-sm" onClick={()=>setAdd(true)}>+ Add Counter</button>
      </div>
      {showAdd && (
        <div className="store-card" style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:'#F0E0E4',marginBottom:12}}>New Counter</div>
          <div className="form-row">
            <div><label className="form-label">Name</label><input className="form-inp" placeholder="e.g., Gold Bangles" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div><label className="form-label">Category</label>
              <select className="form-sel" value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>
                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-gold" onClick={addCounter}>Add</button>
            <button className="btn" onClick={()=>setAdd(false)}>Cancel</button>
          </div>
        </div>
      )}
      {ctrs.length===0
        ? <div className="no-data">No counters for this store yet.</div>
        : ctrs.map(c=>(
          <div key={c.id} className="counter-item" style={{opacity:c.active?1:.5}}>
            <div style={{flex:1}}>
              <span style={{color:'#F0E0E4',fontWeight:500}}>{c.name}</span>
              <span className="badge badge-gold" style={{marginLeft:8}}>{c.cat}</span>
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="btn btn-sm" onClick={()=>toggleCounter(c.id)}>{c.active?'Disable':'Enable'}</button>
              <button className="btn btn-sm btn-danger" onClick={()=>removeCounter(c.id)}>Remove</button>
            </div>
          </div>
        ))
      }
    </div>
  );
}

function AdminAnalytics({stores, counters, entries, weekE}){
  const [mode, setMode] = useState('category');

  const catData = CATEGORIES.map(cat=>{
    const ce=weekE.filter(e=>e.category===cat);
    const cc=ce.filter(e=>e.outcome==='Converted');
    return {cat,total:ce.length,conv:cc.length,pct:ce.length?Math.round(cc.length/ce.length*100):0};
  }).sort((a,b)=>b.total-a.total);

  const insights = [];
  catData.forEach(c=>{ if(c.total>3&&c.pct<30) insights.push(`🔴 ${c.cat}: ${c.total} visits but only ${c.pct}% conversion. Review pricing/stock.`); });
  catData.forEach(c=>{ if(c.total>3&&c.pct>60) insights.push(`✅ ${c.cat}: Excellent ${c.pct}% conversion rate! Scale up.`); });
  const rMap={}; weekE.filter(e=>e.reason).forEach(e=>{rMap[e.reason]=(rMap[e.reason]||0)+1;});
  const topR = Object.entries(rMap).sort((a,b)=>b[1]-a[1])[0];
  if(topR) insights.push(`📊 Top loss reason: "${topR[0]}" (${topR[1]} cases this week)`);

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Analytics</div>
        <div className="page-sub">Cross-store intelligence · This week</div>
      </div>
      {insights.length>0 && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:'#C9A96E',fontWeight:600,marginBottom:8}}>🧠 Smart Insights</div>
          {insights.map((ins,i)=>(

          ))}
        </div>

      <div className="tabs">

            <thead><tr><th>Category</th><th>Walk-ins</th><th>Converted</th><th>Rate</th></tr></thead>
            <tbody>
              {catData.map(c=>(
                <tr key={c.cat}>

                  <td>{c.total}</td>
                  <td style={{color:'#22c55e'}}>{c.conv}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div className="progress-bar" style={{width:70}}><div className="progress-fill" style={{width:`${c.pct}%`,background:c.pct>=50?'#22c55e':c.pct>=30?'#f59e0b':'#ef4444'}}/></div>
                      <span style={{color:c.pct>=50?'#22c55e':c.pct>=30?'#f59e0b':'#ef4444',fontWeight:600}}>{c.pct}%</span>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {mode==='heatmap' && (
        <div className="table-wrap fade-in">
          <div className="table-head"><div className="table-title">Category × Store Conversion Heatmap</div></div>
          <div style={{overflowX:'auto',padding:'0 16px 16px'}}>
            <table style={{minWidth:550}}>
              <thead><tr><th>Category</th>{stores.filter(s=>s.active).map(s=><th key={s.id} style={{fontSize:10,padding:'8px 6px'}}>{s.name.split(' ')[0]}</th>)}</tr></thead>
              <tbody>
                {CATEGORIES.map(cat=>(
                  <tr key={cat}>
                    <td style={{fontWeight:500,color:'#F0E0E4'}}>{cat}</td>
                    {stores.filter(s=>s.active).map(s=>{
                      const ce=weekE.filter(e=>e.storeId===s.id&&e.category===cat);
                      const pct=ce.length?Math.round(ce.filter(e=>e.outcome==='Converted').length/ce.length*100):0;
                      const bg=ce.length===0?'#130810':pct>=50?'rgba(34,197,94,.2)':pct>=30?'rgba(245,158,11,.2)':'rgba(239,68,68,.15)';
                      const fg=ce.length===0?'#6A4050':pct>=50?'#22c55e':pct>=30?'#f59e0b':'#ef4444';
                      return <td key={s.id} style={{background:bg,textAlign:'center',fontSize:12,color:fg,fontWeight:600,padding:'8px 4px'}}>{ce.length?`${pct}%`:'—'}</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {mode==='reasons' && (
        <div className="table-wrap fade-in">
          <div className="table-head"><div className="table-title">Non-Conversion Reasons (This Week)</div></div>
          {Object.entries(rMap).length===0
            ? <div className="no-data">No non-conversion data this week.</div>
            : (
              <table>
                <thead><tr><th>Reason</th><th>Count</th><th>Share</th></tr></thead>
                <tbody>
                  {Object.entries(rMap).sort((a,b)=>b[1]-a[1]).map(([r,cnt])=>{
                    const total=Object.values(rMap).reduce((a,b)=>a+b,0);
                    return (
                      <tr key={r}>
                        <td>{r}</td><td>{cnt}</td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="progress-bar" style={{width:80}}><div className="progress-fill" style={{width:`${Math.round(cnt/total*100)}%`,background:'#ef4444'}}/></div>
                            <span style={{color:'#ef4444'}}>{Math.round(cnt/total*100)}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
        </div>
      )}
    </div>
  );
}

function AdminCustomers({entries}){
  const withPhone = entries.filter(e=>e.phone);
  const cmap = {};
  withPhone.forEach(e=>{
    if(!cmap[e.phone]) cmap[e.phone]={phone:e.phone,name:e.custName,visits:[],stores:new Set()};
    cmap[e.phone].visits.push(e);
    cmap[e.phone].stores.add(e.storeName);
    if(e.custName&&!cmap[e.phone].name) cmap[e.phone].name=e.custName;
  });
  const custs = Object.values(cmap).map(c=>({
    ...c,
    visitCount:c.visits.length,
    convCount:c.visits.filter(v=>v.outcome==='Converted').length,
    totalValue:c.visits.filter(v=>v.outcome==='Converted').reduce((s,v)=>s+v.value,0),
    lastVisit:Math.max(...c.visits.map(v=>v.timestamp)),
    storeCount:c.stores.size,
  })).sort((a,b)=>b.visitCount-a.visitCount);

  function exportCustomers(){
    exportCSV(withPhone,'manepally-customers.csv');
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Customer Intelligence</div>
        <div className="page-sub">{custs.length} tracked customers (with phone number)</div>
      </div>
      <div className="cards-grid">
        <div className="metric-card"><div className="mc-label">Total Tracked</div><div className="mc-value">{custs.length}</div></div>
        <div className="metric-card"><div className="mc-label">Repeat Visitors</div><div className="mc-value mc-gold">{custs.filter(c=>c.visitCount>1).length}</div></div>
        <div className="metric-card"><div className="mc-label">Converted</div><div className="mc-value mc-green">{custs.filter(c=>c.convCount>0).length}</div></div>
        <div className="metric-card"><div className="mc-label">Pending Follow-ups</div><div className="mc-value mc-yellow">{entries.filter(e=>e.outcome==='Pending').length}</div></div>
      </div>
      <div className="table-wrap">
        <div className="table-head">
          <div className="table-title">Customer List</div>
          <button className="btn btn-sm btn-gold" onClick={exportCustomers}>⬇ Export CSV</button>
        </div>
        <table>
          <thead><tr><th>Customer</th><th>Phone</th><th>Visits</th><th>Converted</th><th>Type</th><th>Last Visit</th></tr></thead>
          <tbody>
            {custs.slice(0,50).map(c=>(
              <tr key={c.phone}>
                <td style={{color:'#F0E0E4',fontWeight:500}}>{c.name||'Unknown'}</td>
                <td style={{fontFamily:'monospace',fontSize:12,color:'#9A7080'}}>{c.phone}</td>
                <td>{c.visitCount}</td>
                <td style={{color:'#22c55e'}}>{c.convCount}</td>
                <td><span className={`badge ${c.visitCount>1?'badge-gold':'badge-gray'}`}>{c.visitCount>1?'Repeat':'New'}</span></td>
                <td style={{fontSize:11,color:'#9A7080'}}>{fmtShort(c.lastVisit)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AdminEntries({stores, entries}){
  const [filterStore,  setFS] = useState('all');
  const [filterOutcome,setFO] = useState('all');
  const [filterDate,   setFD] = useState('week');
  const [confirmId,    setConfirmId] = useState(null); // entry id pending delete confirmation
  const [deleting,     setDeleting] = useState(false);

  const filtered = entries
    .filter(e=>filterStore==='all'||e.storeId===filterStore)
    .filter(e=>filterOutcome==='all'||e.outcome===filterOutcome)
    .filter(e=>{
      if(filterDate==='today') return new Date(e.timestamp).toDateString()===today();
      if(filterDate==='week')  return e.timestamp>=Date.now()-7*86400000;
      return true;
    });

  function doExport(){
    exportCSV(filtered, `manepally-entries-${new Date().toISOString().slice(0,10)}.csv`);
  }

  async function deleteEntry(id){
    setDeleting(true);
    try {
      await fbRemove(fbRef(fbDb(), `entries/${id}`));
    } catch(e){ alert('Delete failed: '+e.message); }
    setDeleting(false);
    setConfirmId(null);
  }

  const confirmEntry = confirmId ? entries.find(e=>e.id===confirmId) : null;

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">All Entries</div>
        <div className="page-sub">{entries.length} total records in database</div>
      </div>
      <div className="filter-bar">
        <select className="filter-sel" value={filterDate} onChange={e=>setFD(e.target.value)}>
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="all">All Time</option>
        </select>
        <select className="filter-sel" value={filterStore} onChange={e=>setFS(e.target.value)}>
          <option value="all">All Stores</option>
          {stores.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="filter-sel" value={filterOutcome} onChange={e=>setFO(e.target.value)}>
          <option value="all">All Outcomes</option>
          {OUTCOMES.map(o=><option key={o.key} value={o.key}>{o.label}</option>)}
        </select>
        <button className="btn btn-gold btn-sm" onClick={doExport}>⬇ Export CSV ({filtered.length})</button>
      </div>
      <div className="table-wrap">
        <div className="table-head"><div className="table-title">{filtered.length} entries shown</div></div>
        {filtered.length===0
          ? <div className="no-data">No entries match your filters.</div>
          : (
            <table>
              <thead><tr><th>In</th><th>Out</th><th>Spent</th><th>Store</th><th>CRE</th><th>Customer</th><th>Category</th><th>Outcome</th><th>Bill No.</th><th></th></tr></thead>
              <tbody>
                {filtered.slice(0,100).map((e,i)=>(
                  <tr key={e.id||i}>
                    <td style={{fontSize:11,color:'#9A7080',whiteSpace:'nowrap'}}>{fmtDate(e.timestamp)}</td>
                    <td style={{fontSize:11,color:'#9A7080',whiteSpace:'nowrap'}}>{e.exitTimestamp?fmtTime(e.exitTimestamp):'—'}</td>
                    <td style={{fontSize:11,color:'#f59e0b'}}>{fmtSpent(e.timestamp,e.exitTimestamp)}</td>
                    <td style={{fontSize:12,color:'#9A7880'}}>{e.storeName?.split(' ')[0]||'—'}</td>
                    <td style={{fontSize:12}}>{e.creName}</td>
                    <td><div>{e.custName||'—'}</div>{e.phone&&<div style={{fontSize:10,color:'#9A7080'}}>{e.phone}</div>}</td>
                    <td><span className="badge badge-gold">{e.category}</span></td>
                    <td><span className={`badge ${outcomeColor(e.outcome)}`}>{e.outcome}</span></td>
                    <td style={{fontSize:11,color:'#C9A96E'}}>{e.billNo||'—'}</td>
                    <td>
                      <button className="btn btn-sm btn-danger" style={{fontSize:10,padding:'3px 8px'}}
                        onClick={()=>setConfirmId(e.id)}>🗑</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
      </div>

      {/* Delete confirmation modal */}
      {confirmEntry && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setConfirmId(null)}>
          <div className="modal fade-in" style={{maxWidth:380}}>
            <div className="modal-head">
              <div className="modal-title" style={{color:'#ef4444'}}>⚠ Delete Entry</div>
              <button className="modal-close" onClick={()=>setConfirmId(null)}>×</button>
            </div>
            <div className="modal-body">
              <div style={{background:'#2a0f0f',border:'1px solid #4a1a1a',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'#f0a0a0',lineHeight:1.8}}>
                This will <strong>permanently delete</strong> this entry from the database. This cannot be undone.
              </div>
              <div style={{background:'#130810',border:'1px solid #3A0E20',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#C0A0A8',marginBottom:16,lineHeight:1.8}}>
                <div><span style={{color:'#9A7080'}}>Customer: </span><span style={{color:'#F0E0E4'}}>{confirmEntry.custName||confirmEntry.phone||'Unknown'}</span></div>
                <div><span style={{color:'#9A7080'}}>Store: </span>{confirmEntry.storeName}</div>
                <div><span style={{color:'#9A7080'}}>Time: </span>{fmtDate(confirmEntry.timestamp)}</div>
                <div><span style={{color:'#9A7080'}}>Outcome: </span>{confirmEntry.outcome}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn" style={{flex:1}} onClick={()=>setConfirmId(null)}>Cancel</button>
                <button className="btn btn-danger" style={{flex:1,background:'#2a0f0f'}} onClick={()=>deleteEntry(confirmEntry.id)} disabled={deleting}>
                  {deleting?'Deleting…':'Yes, Delete Permanently'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN SETTINGS ──────────────────────────────────────────────────────────
function AdminSettings({currentPass}){
  const [oldPass,  setOld]  = useState('');
  const [newPass,  setNew]  = useState('');
  const [confirm,  setConf] = useState('');
  const [msg,      setMsg]  = useState(null); // {type:'success'|'error', text}

  async function changePassword(){
    setMsg(null);
    if(!oldPass||!newPass||!confirm){ setMsg({type:'error',text:'Fill in all fields.'}); return; }
    if(oldPass!==currentPass){ setMsg({type:'error',text:'Current password is wrong.'}); return; }
    if(newPass.length<4){ setMsg({type:'error',text:'New password must be at least 4 characters.'}); return; }
    if(newPass!==confirm){ setMsg({type:'error',text:"New passwords don't match."}); return; }
    try {
      await fbSet(fbRef(fbDb(),'adminPass'), newPass);
      setMsg({type:'success',text:'✅ Password changed! Use your new password next time you log in.'});
      setOld(''); setNew(''); setConf('');
    } catch(e){ setMsg({type:'error',text:'Save failed: '+e.message}); }
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Settings</div>
        <div className="page-sub">Manage your admin password</div>
      </div>

      <div className="store-card" style={{maxWidth:400}}>
        <div style={{fontSize:15,fontWeight:600,color:'#F0E0E4',marginBottom:16}}>🔒 Change Admin Password</div>

        <div className="form-group">
          <label className="form-label">Current Password</label>
          <input className="form-inp" type="password" placeholder="Enter current password"
            value={oldPass} onChange={e=>setOld(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">New Password</label>
          <input className="form-inp" type="password" placeholder="Enter new password (min 4 chars)"
            value={newPass} onChange={e=>setNew(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">Confirm New Password</label>
          <input className="form-inp" type="password" placeholder="Type new password again"
            value={confirm} onChange={e=>setConf(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&changePassword()}/>
        </div>

        {msg && (
          <div style={{padding:'10px 14px',borderRadius:8,marginBottom:12,fontSize:13,
            background:msg.type==='success'?'#0f2a1a':'#2a0f0f',
            color:msg.type==='success'?'#22c55e':'#ef4444',
            border:`1px solid ${msg.type==='success'?'#1a4030':'#4a1a1a'}`}}>
            {msg.text}
          </div>
        )}

        <button className="btn btn-gold" onClick={changePassword}>Update Password</button>

        <div style={{marginTop:16,padding:'10px 14px',background:'#130810',borderRadius:8,fontSize:12,color:'#9A7080',lineHeight:1.7}}>
          💡 Your password is saved securely in Firebase.<br/>
          You'll need your new password next time you sign in as Admin.
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const fbReady = useFB();
  const [user,    setUser]     = useState(null);
  const [stores,  setStores]   = useState([]);
  const [counters,setCounters] = useState({});
  const [entries, setEntries]  = useState([]);
  const [adminPass,setAdminPass]= useState(DEFAULT_ADMIN_PASS);
  const [dbReady, setDbReady]  = useState(false);

  // Bootstrap Firebase — always force-write Manepally counters so stale data is replaced
  useEffect(()=>{
    if(!fbReady) return;

    const storesRef = fbRef(fbDb(), 'stores');
    fbGet(storesRef).then(snap=>{
      // Always overwrite counters with latest Manepally counter list
      const ctrMap = {};
      Object.entries(DEFAULT_COUNTERS).forEach(([k,v])=>{ ctrMap[k]=v; });
      fbSet(fbRef(fbDb(),'counters'), ctrMap);

      // Only seed stores if they don't exist yet
      if(!snap.exists()){
        const storeMap = {};
        DEFAULT_STORES.forEach(s=>{ storeMap[s.id]=s; });
        fbSet(storesRef, storeMap);
      }
    });

    // Live subscriptions
    const unsubStores   = fbOnValue(fbRef(fbDb(),'stores'),   snap=>{ const d=snap.val(); setStores(d?Object.values(d):[]);    });
    const unsubCounters = fbOnValue(fbRef(fbDb(),'counters'), snap=>{ setCounters(snap.val()||{});                              });
    const unsubAdminPass= fbOnValue(fbRef(fbDb(),'adminPass'),snap=>{ if(snap.val()) setAdminPass(snap.val()); });
    const unsubEntries  = fbOnValue(fbRef(fbDb(),'entries'),  snap=>{
      const d=snap.val();
      if(d){
        const arr = Object.entries(d).map(([id,v])=>({...v,id})).sort((a,b)=>b.timestamp-a.timestamp);
        setEntries(arr);
      } else { setEntries([]); }
      setDbReady(true);
    });

    // Mark ready even if entries is empty
    setTimeout(()=>setDbReady(true), 2000);

    return ()=>{ unsubStores(); unsubCounters(); unsubAdminPass(); unsubEntries(); };
  },[fbReady]);

  if(!fbReady || !dbReady) return (
    <>
      <style>{CSS}</style>
      <LoadingScreen/>
    </>
  );

  if(!user) return <LoginScreen stores={stores} adminPass={adminPass} onLogin={setUser}/>;

  if(user.role==='admin'){
    return (
      <AdminDashboard
        user={user} stores={stores} counters={counters} entries={entries}
        adminPass={adminPass}
        onLogout={()=>setUser(null)}
        onStoresUpdate={()=>{}}
        onCountersUpdate={()=>{}}
      />
    );
  }

  // CRE view
  return (
    <div>
      <style>{CSS}</style>
      <div style={{position:'fixed',top:0,left:0,right:0,background:'#110810',borderBottom:'1px solid #3A0E20',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:90}}>
        <div>
          <span style={{fontFamily:'Playfair Display,serif',color:'#C9A96E',fontSize:15,fontWeight:700}}>✦ Manepally Jewellers</span>
          <span style={{fontSize:10,color:'#9A7080',marginLeft:8}}>{user.storeName}</span>
        </div>
        <button className="btn btn-sm" style={{fontSize:11}} onClick={()=>setUser(null)}>Sign Out</button>
      </div>
      <div style={{paddingTop:50}}>
        <CreeDashboard user={user} stores={stores} counters={counters} entries={entries}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
